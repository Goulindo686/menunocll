<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOU MENU | Mobile Remote</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050507;
            --accent-color: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.4);
            --card-bg: rgba(20, 20, 25, 0.7);
            --text-color: #ffffff;
            --text-dim: #a0a0a0;
            --success: #00e676;
            --danger: #ff5252;
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a103d 0%, var(--bg-color) 70%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Nav & Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
        }

        /* Sidebar */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: calc(-1 * var(--sidebar-width));
            width: var(--sidebar-width);
            height: 100%;
            background: #0d0d12;
            z-index: 201;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 80px 20px 20px;
            border-right: 1px solid rgba(124, 77, 255, 0.2);
        }

        .sidebar.active {
            left: 0;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }

        .sidebar-item {
            padding: 15px 20px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: var(--text-dim);
            transition: all 0.2s;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .sidebar-item i { margin-right: 15px; font-size: 18px; }

        .sidebar-item.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Main Content */
        main {
            padding: 90px 20px 30px;
            max-width: 600px;
            margin: 0 auto;
        }

        .tab-switcher {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        .tab-switcher::-webkit-scrollbar { display: none; }

        .subtab-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 20px;
            color: var(--text-dim);
            white-space: nowrap;
            font-size: 14px;
            transition: all 0.2s;
        }

        .subtab-btn.active {
            background: rgba(124, 77, 255, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* Cards & Widgets */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            will-change: transform, opacity;
        }

        .card-header {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            padding-bottom: 10px;
        }

        .widget-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        .widget-row:last-child { border-bottom: none; }

        .widget-info { flex: 1; }
        .widget-label { font-size: 15px; font-weight: 500; }
        .widget-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

        /* Controls */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-cap {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2a2a35;
            transition: .3s; border-radius: 24px;
        }
        .slider-cap:before {
            position: absolute; content: "";
            height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider-cap { background-color: var(--accent-color); }
        input:checked + .slider-cap:before { transform: translateX(22px); }

        .slider-container { width: 100%; margin: 10px 0 5px; }
        .range-slider {
            width: 100%; -webkit-appearance: none;
            background: #2a2a35; height: 6px; border-radius: 3px;
            outline: none; margin: 15px 0;
        }
        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px;
            background: var(--accent-color); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .btn-action {
            width: 100%; padding: 12px; border-radius: 12px;
            background: rgba(124, 77, 255, 0.1); border: 1px solid var(--accent-color);
            color: var(--accent-color); font-weight: 600; cursor: pointer;
            transition: all 0.2s; margin-top: 5px;
        }
        .btn-action:active { transform: scale(0.98); background: var(--accent-color); color: white; }

        /* Status Bar */
        .status-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(10, 10, 15, 0.9); border-radius: 15px;
            padding: 12px 20px; display: flex; align-items: center;
            justify-content: space-between; border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px); z-index: 100;
        }
        .status-info { display: flex; align-items: center; font-size: 13px; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            margin-right: 10px; flex-shrink: 0;
        }
        .status-dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-dot.offline { background: var(--danger); }
        
        .user-tag { font-weight: 600; color: var(--accent-color); }

        /* Animations */
        @keyframes pulse { 
            0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; }
        }
        .syncing { animation: pulse 2s infinite; }

        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            transition: opacity 0.5s;
        }
        .loader {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
    </div>

    <header>
        <button class="menu-btn" id="open-sidebar">☰</button>
        <div class="logo">GOU MENU</div>
        <div style="width: 44px;"></div> <!-- spacer -->
    </header>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="sidebar" id="sidebar">
        <div id="sidebar-items">
            <!-- Dynamic Side Tabs -->
        </div>
    </div>

    <main>
        <div class="tab-switcher" id="subtab-container">
            <!-- Dynamic Sub Tabs -->
        </div>

        <div id="content-area">
            <!-- Dynamic Content -->
        </div>
    </main>

    <div class="status-bar">
        <div class="status-info" id="status-container">
            <div class="status-dot offline" id="status-dot"></div>
            <span id="status-text">Desconectado</span>
        </div>
        <div class="user-tag" id="user-display">@USUARIO</div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const username = window.location.pathname.split('/').pop() || 'Unknown';
        
        let currentTab = 'Assistência';
        let currentSubTab = 0;
        let menuSchema = null;
        let currentState = {};
        let lastWidgetValues = {}; // Para evitar flashes / redrender desnecessário

        // Expanded Fallback Schema (Comprehensive)
        const fallbackSchema = {
            "Assistência": {
                subs: ["Aimbot", "Silent Aim", "Triggerbot", "Armas"],
                groups: [
                    [
                        { id: "Aimbot_Enabled", label: "Ativar Aimbot", type: "toggle", cat: "Aimbot", feat: "Enabled" },
                        { id: "Aimbot_ShowFov", label: "Mostrar FOV", type: "toggle", cat: "Aimbot", feat: "ShowFov" },
                        { id: "Aimbot_FOVX", label: "FOV Horizontal", type: "slider", min: 0, max: 800, cat: "Aimbot", feat: "FOVX" },
                        { id: "Aimbot_FOVY", label: "FOV Vertical", type: "slider", min: 0, max: 800, cat: "Aimbot", feat: "FOVY" },
                        { id: "Aimbot_AimbotSpeed", label: "Velocidade (Suavização)", type: "slider", min: 0, max: 12, cat: "Aimbot", feat: "AimbotSpeed" }
                    ],
                    [
                        { id: "SilentAim_Enabled", label: "Ativar Silent Aim", type: "toggle", cat: "SilentAim", feat: "Enabled" },
                        { id: "SilentAim_MagicBullets", label: "Balas Mágicas", type: "toggle", cat: "SilentAim", feat: "MagicBullets" },
                        { id: "SilentAim_FOVX", label: "FOV Silent", type: "slider", min: 0, max: 400, cat: "SilentAim", feat: "FOVX" }
                    ],
                    [
                        { id: "TriggerBot_Enabled", label: "Ativar Triggerbot", type: "toggle", cat: "TriggerBot", feat: "Enabled" },
                        { id: "TriggerBot_Delay", label: "Atraso (ms)", type: "slider", min: 0, max: 50, cat: "TriggerBot", feat: "Delay" }
                    ],
                    [
                        { id: "Player_NoRecoilEnabled", label: "Sem Recuo", type: "toggle", cat: "Player", feat: "NoRecoilEnabled" },
                        { id: "Player_NoSpreadEnabled", label: "Sem Dispersão", type: "toggle", cat: "Player", feat: "NoSpreadEnabled" },
                        { id: "Player_InfiniteAmmoEnabled", label: "Munição Infinita", type: "toggle", cat: "Player", feat: "InfiniteAmmoEnabled" }
                    ]
                ]
            },
            "Visuals": {
                subs: ["Jogadores", "Veículos", "Outros"],
                groups: [
                    [
                        { id: "ESP_Enabled", label: "Ativar ESP", type: "toggle", cat: "ESP", feat: "Enabled" },
                        { id: "ESP_Box", label: "Caixas", type: "toggle", cat: "ESP", feat: "Box" },
                        { id: "ESP_Skeleton", label: "Esqueleto", type: "toggle", cat: "ESP", feat: "Skeleton" },
                        { id: "ESP_UserNames", label: "Nomes", type: "toggle", cat: "ESP", feat: "UserNames" },
                        { id: "ESP_HealthBar", label: "Barra de Vida", type: "toggle", cat: "ESP", feat: "HealthBar" },
                        { id: "ESP_MaxDistance", label: "Distância Máxima", type: "slider", min: 0, max: 1000, cat: "ESP", feat: "MaxDistance" }
                    ],
                    [
                        { id: "VehicleESP_Enabled", label: "ESP Veículos", type: "toggle", cat: "VehicleESP", feat: "Enabled" },
                        { id: "VehicleESP_VehName", label: "Nome do Veículo", type: "toggle", cat: "VehicleESP", feat: "VehName" }
                    ],
                    [
                        { id: "SpectatorESP_Enabled", label: "ESP Espectador", type: "toggle", cat: "SpectatorESP", feat: "Enabled" }
                    ]
                ]
            },
            "Jogador": {
                subs: ["PvP", "Exploits", "Misc"],
                groups: [
                    [
                        { id: "Player_EnableGodMode", label: "Modo Deus", type: "toggle", cat: "Player", feat: "EnableGodMode" },
                        { id: "Player_NoClipEnabled", label: "NoClip", type: "toggle", cat: "Player", feat: "NoClipEnabled" },
                        { id: "Action_Heal", label: "Curar Totalmente", type: "button", feat: "Heal" },
                        { id: "Action_Armor", label: "Reparar Colete", type: "button", feat: "Armor" },
                        { id: "Player_FastRun", label: "Corrida Rápida", type: "toggle", cat: "Player", feat: "FastRun" },
                        { id: "Player_InfiniteStamina", label: "Stamina Infinita", type: "toggle", cat: "Player", feat: "InfiniteStamina" }
                    ],
                    [
                        { id: "Player_PhysicGunEnabled", label: "Physic Gun (E)", type: "toggle", cat: "Player", feat: "PhysicGunEnabled" },
                        { id: "Player_ExplosiveMelee", label: "Soco Explosivo", type: "toggle", cat: "Player", feat: "ExplosiveMelee" },
                        { id: "Player_SuperJump", label: "Super Pulo", type: "toggle", cat: "Player", feat: "SuperJump" }
                    ],
                    [
                        { id: "Player_ChangeFov", label: "Alterar FOV", type: "toggle", cat: "Player", feat: "ChangeFov" },
                        { id: "Player_FovValue", label: "Valor do FOV", type: "slider", min: 30, max: 120, cat: "Player", feat: "FovValue" }
                    ]
                ]
            },
            "Mundo": {
                subs: ["Veículo", "Ambiente"],
                groups: [
                    [
                        { id: "Player_VehicleGodMode", label: "GodMode Veículo", type: "toggle", cat: "Player", feat: "VehicleGodMode" },
                        { id: "Action_FixVehicle", label: "Reparar Veículo", type: "button", feat: "FixVehicle" },
                        { id: "Action_TuneVehicle", label: "Tunar Full (LUA)", type: "button", feat: "TuneVehicle" },
                        { id: "Player_AutoRepair", label: "Auto Reparo", type: "toggle", cat: "Player", feat: "AutoRepair" }
                    ],
                    [
                        { id: "Player_ForceTime", label: "Forçar Horário", type: "toggle", cat: "Player", feat: "ForceTime" },
                        { id: "Player_TimeToSet", label: "Hora", type: "slider", min: 0, max: 23, cat: "Player", feat: "TimeToSet" }
                    ]
                ]
            },
            "Teleporte": {
                subs: ["Locais", "Roupas"],
                groups: [
                    [
                        { id: "Action_TpWaypoint", label: "Teleportar Waypoint", type: "button", feat: "TpWaypoint" },
                        { id: "Action_TpSea", label: "Teleportar para o Mar", type: "button", feat: "TpSea" }
                    ],
                    [
                        { id: "Action_ApplyOutfit", label: "Aplicar Roupas", type: "button", feat: "ApplyOutfit" }
                    ]
                ]
            }
        };

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const contentArea = document.getElementById('content-area');
        const subtabContainer = document.getElementById('subtab-container');
        const userDisplay = document.getElementById('user-display');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        // Logic
        function init() {
            userDisplay.innerText = `@${username.toUpperCase()}`;
            renderSidebar();
            selectTab(currentTab);
            fetchData();
            setInterval(fetchData, 400);

            document.getElementById('open-sidebar').onclick = toggleSidebar;
            sidebarOverlay.onclick = toggleSidebar;
            
            setTimeout(() => {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').remove(), 500);
            }, 800);
        }

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-items');
            container.innerHTML = '';
            
            const tabs = menuSchema ? Object.keys(menuSchema) : Object.keys(fallbackSchema);
            
            tabs.forEach(tab => {
                const item = document.createElement('div');
                item.className = `sidebar-item ${tab === currentTab ? 'active' : ''}`;
                item.innerHTML = `<span>${tab}</span>`;
                item.onclick = () => {
                    selectTab(tab);
                    toggleSidebar();
                };
                container.appendChild(item);
            });
        }

        function selectTab(tab) {
            currentTab = tab;
            currentSubTab = 0;
            renderSidebar();
            renderTabs();
            renderTabContent();
        }

        function renderTabs() {
            const data = (menuSchema && menuSchema[currentTab]) || fallbackSchema[currentTab];
            if(!data) return;

            subtabContainer.innerHTML = '';
            data.subs.forEach((sub, index) => {
                const btn = document.createElement('button');
                btn.className = `subtab-btn ${index === currentSubTab ? 'active' : ''}`;
                btn.innerText = sub;
                btn.onclick = () => {
                    currentSubTab = index;
                    renderTabs();
                    renderTabContent();
                };
                subtabContainer.appendChild(btn);
            });
        }

        function renderTabContent() {
            const data = (menuSchema && menuSchema[currentTab]) || fallbackSchema[currentTab];
            if(!data) {
                contentArea.innerHTML = `<div class="card">Aba em desenvolvimento...</div>`;
                return;
            }

            const widgets = data.groups[currentSubTab] || [];
            contentArea.innerHTML = `
                <div class="card">
                    <div class="card-header">${data.subs[currentSubTab]}</div>
                    ${widgets.map(w => renderWidget(w)).join('')}
                </div>
            `;
            
            // Re-sync values immediately without flashing
            updateWidgetValues(true);
        }

        function renderWidget(w) {
            if(w.type === 'toggle') {
                return `
                    <div class="widget-row">
                        <div class="widget-info">
                            <div class="widget-label">${w.label}</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="${w.id}" onchange="updateValue('${w.cat}', '${w.feat}', this.checked)">
                            <span class="slider-cap"></span>
                        </label>
                    </div>
                `;
            } else if(w.type === 'slider') {
                return `
                    <div class="widget-row" style="flex-direction: column; align-items: flex-start;">
                        <div style="display:flex; justify-content:space-between; width:100%;">
                            <div class="widget-label">${w.label}</div>
                            <div class="widget-label" id="val_${w.id}" style="color: var(--accent-color)">0</div>
                        </div>
                        <div class="slider-container">
                            <input type="range" class="range-slider" id="${w.id}" 
                                min="${w.min}" max="${w.max}" step="${w.step || 1}"
                                oninput="document.getElementById('val_${w.id}').innerText = this.value"
                                onchange="updateValue('${w.cat}', '${w.feat}', parseFloat(this.value))">
                        </div>
                    </div>
                `;
            } else if(w.type === 'button') {
                return `
                    <div class="widget-row">
                        <button class="btn-action" onclick="sendCommand('Action', '${w.feat}')">${w.label}</button>
                    </div>
                `;
            }
            return '';
        }

        async function fetchData() {
            try {
                const res = await fetch(`${API_BASE}/api/state/${username}`);
                if(!res.ok) throw new Error();
                
                currentState = await res.json();
                setStatus(true);

                // Otimizado: Só atualiza os widgets se os valores mudarem
                updateWidgetValues();
                
            } catch (e) {
                setStatus(false);
            }
        }

        function updateWidgetValues(force = false) {
            for (const cat in currentState) {
                if(cat === '_last_sync') continue;
                for (const feature in currentState[cat]) {
                    const id = `${cat}_${feature}`;
                    const val = currentState[cat][feature];
                    
                    // Pular se for igual ao último valor (Evita o FLASH)
                    if(!force && lastWidgetValues[id] === val) continue;
                    lastWidgetValues[id] = val;

                    const el = document.getElementById(id);
                    if(el) {
                        if(el.type === 'checkbox') el.checked = val;
                        else {
                            el.value = val;
                            const valEl = document.getElementById(`val_${id}`);
                            if(valEl) valEl.innerText = val;
                        }
                    }
                }
            }
        }

        async function updateValue(category, feature, value) {
            // Atualização Otimista
            lastWidgetValues[`${category}_${feature}`] = value;
            
            try {
                await fetch(`${API_BASE}/api/command/${username}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category, feature, value })
                });
            } catch (e) {}
        }

        async function sendCommand(category, feature) {
            try {
                await fetch(`${API_BASE}/api/command/${username}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category, feature, value: true })
                });
            } catch (e) {}
        }

        function setStatus(online) {
            if(online) {
                statusDot.className = 'status-dot online';
                statusText.innerText = 'Sincronizado';
                statusText.classList.remove('syncing');
            } else {
                statusDot.className = 'status-dot offline';
                statusText.innerText = 'Buscando PC...';
                statusText.classList.add('syncing');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
