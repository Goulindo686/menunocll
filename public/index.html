<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOU MENU | PREMIUM WEB</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050507;
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.4);
            --panel: rgba(20, 20, 28, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #9494a3;
            --success: #00e676;
            --danger: #ff5252;
            --card-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(124, 77, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(124, 77, 255, 0.05) 0%, transparent 40%);
        }

        /* --- Header & Navigation --- */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 7, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--border);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        .dot.online {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .menu-btn {
            font-size: 1.5rem;
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
        }

        /* --- Side Menu --- */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(30px);
            z-index: 2000;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 80px 30px;
            border-left: 1px solid var(--border);
        }

        .sidebar.active {
            right: 0;
        }

        .sidebar h3 {
            font-size: 1.8rem;
            margin-bottom: 40px;
            color: var(--text-dim);
        }

        .nav-item {
            list-style: none;
            margin-bottom: 20px;
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-dim);
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--accent);
            transform: translateX(10px);
        }

        .sidebar-close {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 1.5rem;
        }

        /* --- Main Content --- */
        .container {
            padding: 20px;
            padding-bottom: 100px;
        }

        .tab-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .tab-subtitle {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        /* --- Sub-tabs --- */
        .subtabs-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            margin-bottom: 25px;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .subtabs-scroll::-webkit-scrollbar { display: none; }

        .subtab-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-weight: 600;
            white-space: nowrap;
            transition: 0.3s;
        }

        .subtab-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 5px 15px var(--accent-glow);
        }

        /* --- Widgets --- */
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            padding: 20px;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .widget-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .widget-row:last-child { border-bottom: none; }

        .widget-label {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .widget-label span:first-child {
            font-weight: 600;
            font-size: 1rem;
        }

        .widget-label span:last-child {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* Switch */
        .switch {
            position: relative;
            width: 54px;
            height: 30px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            inset: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* Slider Range */
        .range-container {
            width: 100%;
            margin-top: 10px;
            padding-bottom: 5px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            outline: none;
        }

        .range-value {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: bold;
        }

        /* --- Footer Info --- */
        .footer {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1500;
            display: none;
        }

        .overlay.active { display: block; }

    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <button class="sidebar-close" onclick="toggleMenu()"><i class="fas fa-times"></i></button>
        <h3>Categorias</h3>
        <ul id="tab-list">
            <!-- Tabs dynamic -->
        </ul>
    </aside>

    <header>
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <div class="logo">GOU MENU</div>
        <div class="status-badge">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">Desconectado</span>
        </div>
    </header>

    <main class="container">
        <h1 class="tab-title" id="current-tab-name">Assistência</h1>
        <p class="tab-subtitle">Configurações de ajuda de mira</p>

        <div class="subtabs-scroll" id="sub-tabs-container">
            <!-- Subtabs dynamic -->
        </div>

        <div id="widgets-container">
            <!-- Widgets will be injected here -->
            <div style="text-align: center; padding: 50px; color: #555;">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                <p style="margin-top: 10px;">Carregando configurações...</p>
            </div>
        </div>
    </main>

    <div class="footer">
        Desenvolvido por GOU MENU &copy; 2026
    </div>

    <script>
        const API_BASE = window.location.origin;
        const username = window.location.pathname.split('/')[1] || 'UnknownUser';
        
        let currentTab = 0;
        let currentSubTab = 0;
        let menuSchema = null;
        let currentState = {};
        
        const tabsInfo = [
            { id: 0, name: "Assistência", subtitle: "Aimbot e Gatilhos", icon: "fa-crosshairs" },
            { id: 1, name: "Visuals", subtitle: "ESP e Visibilidade", icon: "fa-eye" },
            { id: 2, name: "Jogador", subtitle: "Modificações do Personagem", icon: "fa-user" },
            { id: 3, name: "Lista", subtitle: "Jogadores e Veículos", icon: "fa-list" },
            { id: 4, name: "Mundo", subtitle: "Teleporte e Clima", icon: "fa-globe" },
            { id: 5, name: "Recurso", subtitle: "Armas e Exploits", icon: "fa-fire" },
            { id: 6, name: "Config", subtitle: "Sistema e Ajustes", icon: "fa-cog" }
        ];

        // --- UI Interactions ---
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function setStatus(online) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            if(online) {
                dot.classList.add('online');
                text.innerText = "Sincronizado";
            } else {
                dot.classList.remove('online');
                text.innerText = "Desconectado";
            }
        }

        // --- Data Handling ---
        async function fetchData() {
            try {
                // Fetch current state
                const stateRes = await fetch(`${API_BASE}/api/state/${username}`);
                currentState = await stateRes.json();
                
                // Fetch schema if not already loaded
                if(!menuSchema) {
                    const schemaRes = await fetch(`${API_BASE}/api/schema/${username}`);
                    menuSchema = await schemaRes.json();
                    renderMenu();
                } else {
                    updateWidgetValues();
                }
                setStatus(true);
            } catch (err) {
                setStatus(false);
            }
        }

        async function updateValue(category, feature, value) {
            try {
                // Predictive update in UI
                if(!currentState[category]) currentState[category] = {};
                currentState[category][feature] = value;
                
                await fetch(`${API_BASE}/api/toggle`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, category, feature, value })
                });
            } catch (err) {
                setStatus(false);
            }
        }

        // --- Rendering ---
        function renderMenu() {
            renderTabs();
            renderTabContent();
        }

        function renderTabs() {
            const list = document.getElementById('tab-list');
            list.innerHTML = tabsInfo.map(t => `
                <li class="nav-item ${currentTab === t.id ? 'active' : ''}" onclick="selectTab(${t.id})">
                    <i class="fas ${t.icon}"></i> ${t.name}
                </li>
            `).join('');
        }

        function selectTab(id) {
            currentTab = id;
            currentSubTab = 0;
            document.getElementById('current-tab-name').innerText = tabsInfo[id].name;
            document.querySelector('.tab-subtitle').innerText = tabsInfo[id].subtitle;
            toggleMenu();
            renderTabs();
            renderTabContent();
        }

        function renderTabContent() {
            const container = document.getElementById('widgets-container');
            const subtabsContainer = document.getElementById('sub-tabs-container');
            
            // Hardcoded schema mapping based on PC menu structure if schema is missing
            const fallbackSchema = {
                0: { // Assistência
                    subs: ["Aimbot", "Silent", "Trigger"],
                    groups: {
                        0: [ // Aimbot
                            { type: 'toggle', label: 'Ativar Aimbot', cat: 'Aimbot', key: 'Enabled' },
                            { type: 'toggle', label: 'Mostrar FOV', cat: 'Aimbot', key: 'ShowFov' },
                            { type: 'slider', label: 'FOV X', cat: 'Aimbot', key: 'FOVX', min: 0, max: 800 },
                            { type: 'slider', label: 'FOV Y', cat: 'Aimbot', key: 'FOVY', min: 0, max: 800 },
                            { type: 'slider', label: 'Suavização', cat: 'Aimbot', key: 'AimbotSpeed', min: 1, max: 12 }
                        ],
                        1: [ // Silent
                            { type: 'toggle', label: 'Ativar Silent Aim', cat: 'SilentAim', key: 'Enabled' },
                            { type: 'toggle', label: 'Balas Mágicas', cat: 'SilentAim', key: 'MagicBullets' },
                            { type: 'toggle', label: 'Mostrar FOV', cat: 'SilentAim', key: 'ShowFov' }
                        ],
                        2: [ // Trigger
                            { type: 'toggle', label: 'Ativar Triggerbot', cat: 'TriggerBot', key: 'Enabled' },
                            { type: 'slider', label: 'Delay (ms)', cat: 'TriggerBot', key: 'Delay', min: 0, max: 500 }
                        ]
                    }
                },
                1: { // Visuals
                    subs: ["Jogadores", "Veículos"],
                    groups: {
                        0: [
                            { type: 'toggle', label: 'Ativar ESP', cat: 'ESP', key: 'Enabled' },
                            { type: 'toggle', label: 'Caixa (ESP)', cat: 'ESP', key: 'Box' },
                            { type: 'toggle', label: 'Nomes', cat: 'ESP', key: 'UserNames' },
                            { type: 'toggle', label: 'Esqueleto', cat: 'ESP', key: 'Skeleton' },
                            { type: 'toggle', label: 'Barra de Vida', cat: 'ESP', key: 'HealthBar' }
                        ],
                        1: [
                            { type: 'toggle', label: 'Ativar Veículos', cat: 'VehicleESP', key: 'Enabled' },
                            { type: 'toggle', label: 'Nomes', cat: 'VehicleESP', key: 'VehName' },
                            { type: 'toggle', label: 'Distância', cat: 'VehicleESP', key: 'DistanceFromMe' }
                        ]
                    }
                },
                2: { // Jogador
                    subs: ["Geral", "Veículo", "Ações"],
                    groups: {
                        0: [
                            { type: 'toggle', label: 'GodMode', cat: 'Player', key: 'EnableGodMode' },
                            { type: 'toggle', label: 'NoClip', cat: 'Player', key: 'NoClipEnabled' },
                            { type: 'slider', label: 'Velocidade NoClip', cat: 'Player', key: 'NoClipSpeed', min: 1, max: 20 },
                            { type: 'toggle', label: 'Invisibilidade', cat: 'Player', key: 'Invisible' },
                            { type: 'toggle', label: 'Super Pulo', cat: 'Player', key: 'SuperJump' }
                        ],
                        1: [
                            { type: 'toggle', label: 'GodMode Veículo', cat: 'Player', key: 'VehicleGodMode' },
                            { type: 'toggle', label: 'Reparo Automático', cat: 'Player', key: 'AutoRepair' },
                            { type: 'toggle', label: 'Cinto de Segurança', cat: 'Player', key: 'SeatBelt' }
                        ],
                        2: [
                            { type: 'button', label: 'Curar Personagem', cat: 'Action', key: 'Heal', icon: 'fa-heart-pulse' },
                            { type: 'button', label: 'Colocar Colete', cat: 'Action', key: 'Armor', icon: 'fa-shield-halved' },
                            { type: 'button', label: 'Teleportar Waypoint', cat: 'Action', key: 'TpWaypoint', icon: 'fa-map-location' }
                        ]
                    }
                }
            };

            const data = (menuSchema && menuSchema[currentTab]) ? menuSchema[currentTab] : fallbackSchema[currentTab];
            
            if(!data) {
                container.innerHTML = `<p style="padding: 20px; color: var(--text-dim);">Aba em desenvolvimento...</p>`;
                subtabsContainer.innerHTML = '';
                return;
            }

            // Render Subtabs
            subtabsContainer.innerHTML = data.subs.map((s, i) => `
                <button class="subtab-btn ${currentSubTab === i ? 'active' : ''}" onclick="selectSubTab(${i})">${s}</button>
            `).join('');

            // Render Widgets
            const widgets = data.groups[currentSubTab] || [];
            container.innerHTML = `
                <div class="card">
                    <div class="card-header">${data.subs[currentSubTab]}</div>
                    ${widgets.map(w => renderWidget(w)).join('')}
                </div>
            `;
            
            updateWidgetValues();
        }

        function selectSubTab(i) {
            currentSubTab = i;
            renderTabContent();
        }

        function renderWidget(w) {
            const id = `${w.cat}_${w.key}`;
            if(w.type === 'toggle') {
                return `
                    <div class="widget-row">
                        <div class="widget-label">
                            <span>${w.label}</span>
                            <span>Sincronizado</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="${id}" onchange="updateValue('${w.cat}', '${w.key}', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                `;
            } else if(w.type === 'slider') {
                return `
                    <div class="card" style="padding: 15px 0; background: none; border: none; margin-bottom: 0;">
                        <div class="widget-row" style="border: none;">
                            <div class="widget-label"><span>${w.label}</span></div>
                            <span class="range-value" id="${id}_val">0</span>
                        </div>
                        <div class="range-container">
                            <input type="range" id="${id}" min="${w.min}" max="${w.max}" step="${w.step || 1}" 
                                oninput="document.getElementById('${id}_val').innerText = this.value"
                                onchange="updateValue('${w.cat}', '${w.key}', parseFloat(this.value))">
                        </div>
                    </div>
                `;
            } else if(w.type === 'button') {
                return `
                    <div class="widget-row" onclick="updateValue('${w.cat}', '${w.key}', true)">
                        <div class="widget-label"><span>${w.label}</span></div>
                        <i class="fas ${w.icon}" style="color: var(--accent);"></i>
                    </div>
                `;
            }
            return '';
        }

        function updateWidgetValues() {
            for (const cat in currentState) {
                for (const feature in currentState[cat]) {
                    const el = document.getElementById(`${cat}_${feature}`);
                    const valEl = document.getElementById(`${cat}_${feature}_val`);
                    if(el) {
                        if(el.type === 'checkbox') el.checked = currentState[cat][feature];
                        else {
                            el.value = currentState[cat][feature];
                            if(valEl) valEl.innerText = el.value;
                        }
                    }
                }
            }
        }

        window.onload = () => {
            fetchData();
            setInterval(fetchData, 400); // Polling fast enough
        };

    </script>
</body>
</html>
